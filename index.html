<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Calculadora</title>
</head>

<body>
    <header>Calculator</header>
    <div class="contenedor">
        <div class="calculadora">
            <div class="pantalla">
                <div id="valor-anterior"></div>
                <div id="valor-actual"></div>
            </div>
            <button id="btn-clear" class="col-2">C</button>
            <button id="btn-del">&larr;</button>
            <button class="operator" value="/">/</button>

            <button class="number" value="7">7</button>
            <button class="number" value="8">8</button>
            <button class="number" value="9">9</button>
            <button class="operator" value="*">*</button>

            <button class="number" value="4">4</button>
            <button class="number" value="5">5</button>
            <button class="number" value="6">6</button>
            <button class="operator" value="-">-</button>

            <button class="number" value="1">1</button>
            <button class="number" value="2">2</button>
            <button class="number" value="3">3</button>
            <button class="operator" value="+">+</button>

            <button class="number col-2" value="0">0</button>
            <button class="number" value=".">.</button>
            <button id="btn-igual" value="=">=</button>
        </div>
    </div>
    <footer>RomaDev © 2022</footer>
</body>

</html>
